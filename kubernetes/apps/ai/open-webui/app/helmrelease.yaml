---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chart:
    spec:
      chart: open-webui
      version: 14.8.0
      sourceRef:
        kind: HelmRepository
        name: open-webui
  interval: 1h
  values:
    ollama:
      enabled: false

    pipelines:
      enabled: false

    enableOpenaiApi: false

    replicaCount: 1

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    persistence:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
      storageClass: local-path

    service:
      type: ClusterIP
      port: 8080
      containerPort: 8080

    route:
      enabled: true
      hostnames:
        - chat.${SECRET_DOMAIN}
      parentRefs:
        - name: envoy-external
          namespace: network
          sectionName: https
      matches:
        - path:
            type: PathPrefix
            value: /
      backendRef:
        group: ""
        kind: Service
        weight: 1
