---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: *app
  install:
    timeout: 5m
    remediation:
      retries: 1
  upgrade:
    timeout: 5m
    remediation:
      retries: 1
  values:
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: &uid 10000
            runAsGroup: *uid
            fsGroup: *uid
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.29.2@sha256:2bba4ab37729ebdd864d4caf277b24fec4cd8bfc2855185fd9f4c90f9bf7bfa3
            args:
              - gateway
              - run
            env:
              TZ: Asia/Singapore
              HERMES_HOME: /opt/data
              HOME: /opt/data
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_PORT: &apiPort 8642
              API_SERVER_CORS_ORIGINS: https://hermes.${SECRET_DOMAIN}
              HERMES_DASHBOARD: "true"
              HERMES_DASHBOARD_HOST: 0.0.0.0
              HERMES_DASHBOARD_PORT: &dashboardPort 9119
              HERMES_DASHBOARD_TUI: "1"
            envFrom:
              - secretRef:
                  name: hermes-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *dashboardPort
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *dashboardPort
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: *app
        ports:
          api:
            port: *apiPort
          http:
            port: 80
            targetPort: *dashboardPort
    route:
      app:
        hostnames:
          - hermes.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 80
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: local-path
        globalMounts:
          - path: /opt/data
      tmp:
        type: emptyDir
