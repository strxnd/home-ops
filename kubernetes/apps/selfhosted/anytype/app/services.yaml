---
apiVersion: v1
kind: Service
metadata:
  name: anytype-sync
  annotations:
    lbipam.cilium.io/ips: "192.168.20.13"
    external-dns.alpha.kubernetes.io/hostname: "anytype.${SECRET_DOMAIN}"
    external-dns.alpha.kubernetes.io/target: "${SECRET_PUBLIC_IP}"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/instance: anytype
    app.kubernetes.io/name: anytype
  ports:
    - name: node-1-tcp
      port: 1001
      targetPort: 1001
      protocol: TCP
    - name: node-2-tcp
      port: 1002
      targetPort: 1002
      protocol: TCP
    - name: node-3-tcp
      port: 1003
      targetPort: 1003
      protocol: TCP
    - name: coord-tcp
      port: 1004
      targetPort: 1004
      protocol: TCP
    - name: file-tcp
      port: 1005
      targetPort: 1005
      protocol: TCP
    - name: consensus-tcp
      port: 1006
      targetPort: 1006
      protocol: TCP
    - name: node-1-udp
      port: 1011
      targetPort: 1011
      protocol: UDP
    - name: node-2-udp
      port: 1012
      targetPort: 1012
      protocol: UDP
    - name: node-3-udp
      port: 1013
      targetPort: 1013
      protocol: UDP
    - name: coord-udp
      port: 1014
      targetPort: 1014
      protocol: UDP
    - name: file-udp
      port: 1015
      targetPort: 1015
      protocol: UDP
    - name: consensus-udp
      port: 1016
      targetPort: 1016
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-1
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/instance: anytype
    app.kubernetes.io/name: anytype
  ports:
    - name: mongo
      port: 27001
      targetPort: 27001
      protocol: TCP
---
apiVersion: v1
